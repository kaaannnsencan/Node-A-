<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NODE - Vize Asistanı</title>
    <style>
        /* Ekranı tam kaplaması için kesin kurallar */
        html, body { margin: 0; padding: 0; height: 100%; background-color: #111520; font-family: 'Segoe UI', sans-serif; box-sizing: border-box; }
        
        /* Ana Taşıyıcı: Yan yana iki kutu */
        .container { display: flex; gap: 20px; padding: 20px; height: 100vh; width: 100%; box-sizing: border-box; }

        /* Sol Menü: Sabit genişlik */
        .left-menu { width: 300px; background-color: #1a1f35; border-radius: 15px; padding: 20px; color: white; display: flex; flex-direction: column; }
        .left-menu h1 { color: #60a5fa; margin-top: 0; font-size: 2.5rem; }
        .left-menu p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .btn { background-color: #272d47; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; color: #cbd5e1; font-weight: bold; }

        /* Sağ Panel: Kalan tüm alanı ZORLA kaplar */
        .right-content { flex: 1; background-color: #1a1f35; border-radius: 15px; overflow: hidden; display: flex; }
        
        /* Bot: Sağ panelin tam içine oturur */
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* TELEFON EKRANI İÇİN KESİN ÇÖZÜM */
        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; min-height: 100vh; padding: 10px; }
            .left-menu { width: 100%; }
            /* Mobilde bota devasa bir alan veriyoruz */
            .right-content { width: 100%; height: 85vh; min-height: 600px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-menu">
            <h1>NODE</h1>
            <p>İstinye'deki en iyi vize kankan. C++, Makine Öğrenmesi veya Yöneylem... Ne istersen sor.</p>
            <div class="btn">⚙️ Yöneylem Modelleri</div>
            <div class="btn">💻 C++ OOP</div>
            <div class="btn">🤖 Makine Öğrenmesi</div>
        </div>

        <div class="right-content">
            <iframe 
                src="https://udify.app/chat/OIAwfvtlfStG8TMt" 
                allow="microphone; camera"
                title="NODE AI">
            </iframe>
        </div>
    </div>
</body>
</html>
